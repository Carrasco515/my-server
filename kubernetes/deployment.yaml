apiVersion: apps/v1
kind: Deployment
metadata:
  name: mein-server
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mein-server
  template:
    metadata:
      labels:
        app: mein-server
    spec:
      containers:
        - name: mein-server
          image: mein-server-server:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mein-server-config
            - secretRef:
                name: mein-server-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20