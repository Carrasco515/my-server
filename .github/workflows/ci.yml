name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m compileall .

      - name: Run tests
        run: pytest -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mein-server-server:ci .

  kustomize-render:
    name: Kustomize render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check kubectl client
        run: kubectl version --client

      - name: Render dev overlay
        run: kubectl kustomize kubernetes/overlays/dev

      - name: Render prod overlay
        run: kubectl kustomize kubernetes/overlays/prod